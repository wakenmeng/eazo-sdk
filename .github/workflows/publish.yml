name: Publish to NPM

on:
  push:
    tags:
      - '*'
      - 'v*'
      - 'V*'

jobs:
  publish-auth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          VERSION=${VERSION#V}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd auth && npm ci

      - name: Build
        run: cd auth && npm run build

      - name: Update package version
        run: cd auth && npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish @eazo/auth
        run: cd auth && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-sdk:
    runs-on: ubuntu-latest
    needs: publish-auth

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          VERSION=${VERSION#V}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update @eazo/auth dependency version
        run: cd sdk && npm pkg set dependencies.@eazo/auth=${{ steps.get_version.outputs.version }}

      - name: Install dependencies
        run: cd sdk && npm ci

      - name: Build
        run: cd sdk && npm run build

      - name: Run tests
        run: cd sdk && npm test

      - name: Update package version
        run: cd sdk && npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish @eazo/sdk
        run: cd sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
